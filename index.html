<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Kakek Angka</title>

<style>
body{
  margin:0;
  font-family:Arial;
  background:black;
  color:white;
}

/* BACKGROUND */
.bg{
  position:fixed;
  width:100%;
  height:100%;
  background:linear-gradient(45deg,#ff00cc,#00ccff,#00ff99,#ffcc00);
  background-size:400% 400%;
  animation:bgmove 10s infinite alternate;
  filter:blur(50px);
  z-index:-1;
}

@keyframes bgmove{
  0%{background-position:0% 50%;}
  100%{background-position:100% 50%;}
}

/* MENU */
.menu{
  display:flex;
  justify-content:center;
  gap:8px;
  padding:10px;
  background:rgba(0,0,0,0.4);
  position:sticky;
  top:0;
}

.menu button{
  padding:10px 14px;
  border:none;
  border-radius:10px;
  background:rgba(255,255,255,0.1);
  color:white;
  cursor:pointer;
}

.menu button:hover{
  background:cyan;
  color:black;
}

/* CONTENT */
.content{
  display:none;
  padding:20px;
}

.logo{
  font-size:40px;
  text-align:center;
  font-weight:bold;
  text-shadow:2px 2px 0 cyan, 4px 4px 0 magenta;
}

.card{
  background:rgba(255,255,255,0.08);
  padding:15px;
  margin:10px 0;
  border-radius:15px;
}

/* BUTTON */
button.action{
  padding:10px 15px;
  border:none;
  border-radius:10px;
  background:cyan;
  font-weight:bold;
  cursor:pointer;
}
</style>
</head>

<body>

<div class="bg"></div>

<!-- MENU -->
<div class="menu">
  <button onclick="show('home')">Home</button>
  <button onclick="show('result')">Result</button>
  <button onclick="show('pesanan')">Pesanan</button>
  <button onclick="show('cs')">CS</button>
</div>

<!-- HOME -->
<div id="home" class="content">
  <div class="logo">🔥 KAKEK ANGKA</div>

  <div class="card">
    <h3>Dashboard Premium</h3>
    <p>Website neon modern siap pakai</p>
  </div>
</div>

<!-- RESULT -->
<div id="result" class="content">
  <div class="card">
    <h2>📊 Result</h2>
    <a href="https://hongkongpools.com/" target="_blank" style="color:cyan;">
      👉 Buka Result
    </a>
  </div>
</div>

<!-- PESANAN -->
<div id="pesanan" class="content">
  <div class="card">

    <h2>🛒 Pesanan</h2>

    <ul>
      <li>4D = 150K</li>
      <li>3D = 75K</li>
      <li>2D = 50K</li>
    </ul>

    <form onsubmit="sendOrder(event)">

      <p>Nama:</p>
      <input id="nama" required style="padding:10px;width:90%;border-radius:8px;border:none;">

      <p>Paket:</p>
      <select id="paket" onchange="showPay(this.value)" required
      style="padding:10px;width:95%;border-radius:8px;">
        <option value="">Pilih Paket</option>
        <option>4D - 150K</option>
        <option>3D - 75K</option>
        <option>2D - 50K</option>
      </select>

      <p>Catatan:</p>
      <textarea id="catatan" style="padding:10px;width:90%;border-radius:8px;"></textarea>

      <br><br>

      <button class="action">Kirim Order</button>

    </form>

    <div id="pay" class="card" style="display:none;border:2px solid cyan;">
      <h3>💳 Pembayaran</h3>
      <p>SEABANK: 901134212327</p>
      <p>DANA: 085267402632</p>
    </div>

  </div>
</div>

<!-- CS -->
<div id="cs" class="content">
  <div class="card">
    <h2>📩 CS</h2>

    <button class="action"
    onclick="window.location.href='mailto:hongkongpools1313chan@gmail.com'">
      Hubungi CS
    </button>
  </div>
</div>

<!-- SCRIPT FIX -->
<script>

function show(page){
  document.querySelectorAll('.content').forEach(e=>e.style.display='none');
  document.getElementById(page).style.display='block';
}

/* tampilkan home saat pertama */
window.onload = function(){
  show('home');
}

function sendOrder(e){
  e.preventDefault();

  let nama = document.getElementById("nama").value;
  let paket = document.getElementById("paket").value;
  let cat = document.getElementById("catatan").value;

  let msg = ORDER:\nNama: ${nama}\nPaket: ${paket}\nCatatan: ${cat};

  window.location.href =
  "mailto:hongkongpools1313chan@gmail.com?subject=Order&body=" + encodeURIComponent(msg);
}
