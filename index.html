<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Kakek Angka</title>

<style>
body{
margin:0;
font-family:Arial;
background:#000;
color:white;
}

.bg{
position:fixed;
width:100%;
height:100%;
background:linear-gradient(45deg,#ff00cc,#00ccff,#00ff99);
background-size:400% 400%;
animation:bg 8s infinite alternate;
filter:blur(40px);
z-index:-1;
}
@keyframes bg{0%{background-position:0%}100%{background-position:100%}}

.menu{
display:flex;
justify-content:center;
gap:8px;
padding:10px;
background:rgba(0,0,0,0.5);
position:sticky;
top:0;
}

.menu button{
padding:10px;
border:none;
border-radius:8px;
background:#222;
color:white;
cursor:pointer;
}

.menu button:hover{background:cyan;color:black}

.content{display:none;padding:20px}

.card{
background:rgba(255,255,255,0.1);
padding:15px;
border-radius:12px;
margin:10px 0;
}

.logo{
text-align:center;
font-size:32px;
font-weight:bold;
text-shadow:2px 2px cyan;
}
</style>
</head>

<body>

<div class="bg"></div>

<div class="menu">
<button onclick="show('home')">Home</button>
<button onclick="show('result')">Result</button>
<button onclick="show('pesanan')">Pesanan</button>
<button onclick="show('cs')">CS</button>
</div>

<div id="home" class="content">
<div class="logo">🔥 KAKEK ANGKA</div>
<div class="card">Website sudah aktif & stabil</div>
</div>

<div id="result" class="content">
<div class="card">
<h2>Result</h2>
<a style="color:cyan" href="https://hongkongpools.com/" target="_blank">Buka Result</a>
</div>
</div>

<div id="pesanan" class="content">
<div class="card">

<h2>Pesanan</h2>

<ul>
<li>4D = 150K</li>
<li>3D = 75K</li>
<li>2D = 50K</li>
</ul>

<p>Hubungi CS untuk order</p>

</div>
</div>

<div id="cs" class="content">
<div class="card">
<h2>CS</h2>
<p>Email: hongkongpools1313chan@gmail.com</p>
</div>
</div>

<script>
function show(id){
document.querySelectorAll('.content').forEach(e=>e.style.display='none');
document.getElementById(id).style.display='block';
}
window.onload=()=>show('home');
</script>

</body>
</html>
