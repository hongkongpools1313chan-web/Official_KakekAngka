<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Kakek Angka</title>

<style>
body{
margin:0;
font-family:Arial;
background:#000;
color:white;
}

.menu{
display:flex;
justify-content:center;
gap:8px;
padding:10px;
background:#111;
position:sticky;
top:0;
}

.menu button{
padding:10px;
border:none;
border-radius:8px;
background:#333;
color:white;
cursor:pointer;
}

.menu button:hover{
background:cyan;
color:black;
}

.content{
display:none;
padding:20px;
}

.card{
background:rgba(255,255,255,0.08);
padding:15px;
border-radius:12px;
margin-top:10px;
}

button{
cursor:pointer;
}
</style>
</head>

<body>

<div class="menu">
<button onclick="show('home')">Home</button>
<button onclick="show('result')">Result</button>
<button onclick="show('pesanan')">Pesanan</button>
<button onclick="show('cs')">CS</button>
</div>

<!-- HOME -->
<div id="home" class="content">
<h2>🔥 KAKEK ANGKA</h2>
<div class="card">Web sudah aktif</div>
</div>

<!-- RESULT -->
<div id="result" class="content">
<div class="card">
<h2>Result</h2>
<a href="https://hongkongpools.com/" target="_blank" style="color:cyan">
Buka Result
</a>
</div>
</div>

<!-- PESANAN -->
<div id="pesanan" class="content">
<div class="card">

<h2>🛒 Pesanan</h2>

<p>4D = 150K</p>
<p>3D = 75K</p>
<p>2D = 50K</p>

<form onsubmit="send(event)">

<input id="nama" placeholder="Nama" required
style="padding:10px;width:90%"><br><br>

<select id="paket" onchange="pay(this.value)" required
style="padding:10px;width:95%">
<option value="">Pilih Paket</option>
<option>4D - 150K</option>
<option>3D - 75K</option>
<option>2D - 50K</option>
</select>

<br><br>

<textarea id="catatan" placeholder="Catatan"
style="padding:10px;width:90%"></textarea>

<br><br>

<button>Kirim Order</button>

</form>

<div id="paybox" class="card" style="display:none;border:2px solid cyan">
<p>💳 SEABANK: 901134212327</p>
<p>💳 DANA: 085267402632</p>
</div>

</div>
</div>

<!-- CS -->
<div id="cs" class="content">
<div class="card">
<h2>CS</h2>
<p>Email: hongkongpools1313chan@gmail.com</p>
</div>
</div>

<script>

function show(id){
document.querySelectorAll('.content').forEach(e=>e.style.display='none');
document.getElementById(id).style.display='block';
}

window.onload=()=>show('home');

function send(e){
e.preventDefault();

let n=document.getElementById("nama").value;
let p=document.getElementById("paket").value;
let c=document.getElementById("catatan").value;

let msg=Nama:${n}\nPaket:${p}\nCatatan:${c};

location.href="mailto:hongkongpools1313chan@gmail.com?subject=Order&body="+encodeURIComponent(msg);
}

function pay(v){
document.getElementById("paybox").style.display=v?"block":"none";
}

</script>

</body>
</html>
